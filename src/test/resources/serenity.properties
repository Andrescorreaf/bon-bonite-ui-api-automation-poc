# Browser configuration
webdriver.driver=chrome
webdriver.chrome.driver=${user.dir}/chromedriver

# Display and features
serenity.take.screenshots=FOR_EACH_ACTION
serenity.keep.driver.open=false
serenity.verbose.screenshots=true

# Browser start options
# chrome.switches=--no-sandbox,--disable-dev-shm-usage,--headless
# chrome.capabilities=headless;disable-extensions;disable-infobars;disable-logging
chrome.capabilities=disable-extensions;disable-infobars;disable-logging
