serenity {
    take.screenshots = FOR_FAILURES
    outputDirectory="target/site/serenity"
    report.show.manual.tests = true
    report.show.retries = true
    report.test.durations = false
    reports="single-page-html"
    requirements.dir="src/test/resources/features"
}

headless.mode = false

webdriver {
    driver = chrome
    base.url = "https://www.bon-bonite.com/"
    auto-driver-download = true
    chrome.driver = "${user.dir}/chromedriver"
    capabilities {
        browserName = "chrome"
        acceptInsecureCerts = true
        "goog:chromeOptions" {
            args = [
                "--disable-dev-shm-usage",
                "--no-sandbox",
                "--remote-allow-origins=*",
                "--window-size=1920,1080",
                "--start-maximized"
                # "--disable-software-rasterizer"
            ]
        }
    }
}